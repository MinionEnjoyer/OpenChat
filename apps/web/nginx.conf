server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Desktop clients upload attachments through /api/uploads (native clients have no
  # Share session cookie); allow bodies up to the API's own file-size cap so large
  # images/files aren't rejected here with a 413 before reaching the API.
  client_max_body_size 100m;

  location / { try_files $uri /index.html; }

  location /api/ {
    proxy_pass http://api:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Pass NPM's original proto (https) through so the API sets Secure cookies correctly.
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }

  location /ws {
    proxy_pass http://api:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_read_timeout 3600s;
  }
}
