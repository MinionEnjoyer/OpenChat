name: desktop-release

# Push a tag like `desktop-v0.1.3` to build + sign both platforms and publish one
# GitHub Release with a combined updater manifest (latest.json for Windows + macOS).
on:
  push:
    tags: ['desktop-v*']

permissions:
  contents: write

jobs:
  # 1) Create a single draft release the build jobs upload into (avoids the matrix
  #    race where each platform tries to create the release itself).
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/github-script@v7
        id: create
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `OpenChat Desktop ${tag}`,
              draft: true,
              prerelease: false,
            });
            return data.id;

  # 2) Build each platform and upload into the draft release. max-parallel: 1 so the
  #    two jobs don't race on latest.json (each merges its platform into it).
  build:
    needs: create-release
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: windows-latest
            args: ''
            rust-targets: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: Install desktop tooling
        working-directory: apps/desktop
        run: npm install
      - uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SERVER_URL: ${{ vars.SERVER_URL }}

  # 3) Publish the release once both platforms are uploaded.
  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
